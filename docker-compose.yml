services:
  # FastAPI CV Model Server
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: pet-ai-fastapi
    ports:
      - "8000:8000"
    volumes:
      # Model weights - mounted read-only for safety
      - ./weights:/app/weights:ro
      # Sample images for testing
      - ./sample_images:/app/sample_images:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${OPENROUTER_API_KEY}}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
    env_file:
      - .env
    networks:
      - pet-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Chatbot RAG Agent Service
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    container_name: pet-ai-chatbot
    depends_on:
      fastapi:
        condition: service_healthy
    stdin_open: true
    tty: true
    volumes:
      # Persistent ChromaDB vector store
      - chatbot-db:/app/chatbot/db
      # RAG documents and ingestion output
      - chatbot-rag-output:/app/chatbot/rag_output
      # Cleaned documents
      - chatbot-rag-cleaned:/app/chatbot/rag_output_cleaned
      # Raw PDF input directory - mounted for easy updates
      - ./chatbot/raw_pdfs:/app/chatbot/raw_pdfs
      # Model weights - read-only
      - ./weights:/app/weights:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${OPENROUTER_API_KEY}}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      # Service discovery: FastAPI is accessible via service name
      - FASTAPI_URL=http://fastapi:8000
    env_file:
      - .env
    networks:
      - pet-ai-network
    restart: "no"

networks:
  pet-ai-network:
    driver: bridge

volumes:
  # Named volumes for persistent data
  chatbot-db:
    driver: local
  chatbot-rag-output:
    driver: local
  chatbot-rag-cleaned:
    driver: local
